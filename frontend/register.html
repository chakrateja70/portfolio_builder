<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Register - Portfolio Builder</title>
  <link rel="stylesheet" href="/css/style.css" />
</head>
<body class="auth-page">

  <div class="auth-card">
    <div class="auth-logo">
      <h1>📁 Portfolio Builder</h1>
      <p>Build your student portfolio in minutes</p>
    </div>

    <h2>Create Account</h2>

    <form id="registerForm">

      <div class="form-group">
        <label for="username">Username</label>
        <input type="text" id="username" placeholder="e.g. teja_dev" required />
      </div>

      <div class="form-group">
        <label for="email">Gmail / Email</label>
        <input type="email" id="email" placeholder="you@gmail.com" required />
      </div>

      <div class="form-group">
        <label for="password">Password</label>
        <div class="password-wrapper">
          <input type="password" id="password" placeholder="Minimum 6 characters" required />
          <button type="button" class="toggle-password" onclick="togglePassword('password', this)">👁️</button>
        </div>
      </div>

      <div class="form-group">
        <label for="confirm_password">Confirm Password</label>
        <div class="password-wrapper">
          <input type="password" id="confirm_password" placeholder="Re-enter your password" required />
          <button type="button" class="toggle-password" onclick="togglePassword('confirm_password', this)">👁️</button>
        </div>
      </div>

      <div id="alertBox" class="alert"></div>

      <button type="submit" class="btn btn-primary" id="submitBtn">
        Create Account
      </button>
    </form>

    <div class="auth-link">
      Already have an account? <a href="/login.html">Sign in</a>
    </div>
  </div>

  <script src="/js/auth.js"></script>
</body>
</html>
